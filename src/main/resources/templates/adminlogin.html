<html th:replace="~{base::layout(~{::section})}">
<head>
</head>

<body>
	<section>
		<div class="row bg-primary pt-5 m-0">
			<div class="col-sm-5 mx-auto bg-white rounded-4 my-5 pt-4">
			<form class="form-group" th:object="${dto}" method="post">
				<div class="row">
					<div class="col-sm-10 mx-auto text-center py-4">
						<img alt="image not found" src="img/logo1.png" width="35%">
						<h2 class="text-center pt-4" style="color: blue;">Admin Login</h2>
					</div>
					<div class="col-sm-10 mx-auto text-center">
						<div th:if="${msg}" class="alert alert-warning alert-dismissible fade show" role="alert">
			     	   		<span th:text="${msg}"></span>
			     	   		<button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
			     		</div>
					</div>
					<div class="col-sm-10 mx-auto py-2">
						<label class="fw-bold">Enter User Id</label>
						<br>
						<input type="text" placeholder="User Id..." th:field="${dto.userid}" class="form-control rounded-5 py-2" required/>
					</div>
					
					<div class="col-sm-10 mx-auto py-2">
						<label class="fw-bold">Enter Your Password</label>
						<input type="password" placeholder="Password..." th:field="${dto.password}" class="form-control rounded-5 py-2" required/>
					</div>
					
					<div class="col-sm-10 mx-auto py-4 text-center">
						<button type="submit" class="btn btn-primary rounded-5 px-4 py-2 w-100">Login</button>
					</div>
				</div>
			</form>
			</div>
		</div>
	</section>
</body>
</html>
