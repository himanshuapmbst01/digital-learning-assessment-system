<html th:replace="~{admin/adminbase::layout(~{::section})}">
<head></head>
<body>
	<section>
		<h1 class="text-center text-info">Enquiry Management</h1>

		<div class="row">
			<div class="col-sm-12 mx-auto p-3 bg-white shadow rounded-2">
			<div class="table-responsive">
				
				<table id="myTable" class="table table-bordered display">
					<thead class="text-center table-dark">
						<tr>
							<th class="text-center">Sr. No.</th>
							<th class="text-center">Name</th>
							<th class="text-center">Gender</th>
							<th class="text-center">Contact No.</th>
							<th class="text-center">Email</th>
							<th>Address</th>
							<th>Enquiry Message</th>
							<th class="text-center">Enquiry Date</th>
							<th class="text-center">Delete</th>
						</tr>
					</thead>
					<tbody class="text-center">
						<tr th:each="e, srno:${eqList}">
							<td th:text="${srno.index+1}" class="text-center"></td>
							<td th:text="${e.name}"></td>
							<td th:text="${e.gender}"></td>
							<td th:text="${e.contactno}"></td>
							<td th:text="${e.emailaddress}"></td>
							<td th:text="${e.address}"></td>
							<td th:text="${e.enquirytext}"></td>
							<td th:text="${e.posteddate}"></td>
							<td>
								<a th:href="@{deleteenquiry(id=${e.id})}" class="text-decoration-none">
									<button class="btn btn-danger" onclick="return confirm('Are you sure want to delete?');">Delete</button>
								</a>
							</td>
						</tr>
					</tbody>
				</table>
				</div>
			</div>
		</div>
	</section>
</body>
</html>
